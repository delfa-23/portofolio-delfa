<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificates — Delfa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <style>
    :root {
      --ink: #0e0e0e;
      --paper: #f5f0e8;
      --warm: #e8dfc8;
      --accent: #c84b2f;
      --muted: #7a7060;
      --border: rgba(14,14,14,0.12);
      --serif: "DM Serif Display", Georgia, serif;
      --mono: "DM Mono", monospace;
      --sans: "DM Sans", sans-serif;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
      line-height: 1.65;
      min-height: 100vh;
    }

    /* Noise */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--warm); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

    /* ── NAV ── */
    #navbar {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 900;
      transition: transform 0.4s var(--ease-out);
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.1rem 2rem;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s, background 0.3s, backdrop-filter 0.3s;
    }

    #navbar.scrolled .nav-inner {
      background: rgba(245,240,232,0.85);
      backdrop-filter: blur(14px);
      border-color: var(--border);
    }

    .nav-logo {
      font-family: var(--serif);
      font-size: 1.2rem;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--ink);
    }

    .nav-logo span { color: var(--accent); font-style: italic; }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.5rem 1.2rem;
      border: 1.5px solid var(--ink);
      color: var(--ink);
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }

    .nav-back:hover { background: var(--ink); color: var(--paper); }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 10rem 0 4rem;
      background: var(--ink);
      color: var(--paper);
      position: relative;
      overflow: hidden;
    }

    .page-header-bg {
      position: absolute;
      inset: 0;
      font-family: var(--serif);
      font-size: 20rem;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px rgba(245,240,232,0.04);
      display: flex;
      align-items: flex-end;
      padding-left: 1rem;
      padding-bottom: -1rem;
      pointer-events: none;
      user-select: none;
      overflow: hidden;
    }

    .page-header .container { position: relative; z-index: 2; }

    .page-eyebrow {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.2rem;
    }

    .page-eyebrow::before {
      content: "";
      display: block;
      width: 2rem;
      height: 1px;
      background: var(--accent);
    }

    .page-title {
      font-family: var(--serif);
      font-size: clamp(3rem, 6vw, 6rem);
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }

    .page-title em { font-style: italic; color: transparent; -webkit-text-stroke: 1.5px var(--paper); }

    .page-meta {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .page-meta-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.45);
    }

    .page-meta-item strong {
      color: var(--paper);
      font-size: 1.1rem;
      font-family: var(--serif);
      font-weight: 400;
    }

    /* ── GRID SECTION ── */
    #certs-section { padding: 5rem 0 6rem; }

    .certs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .cert-card {
      background: var(--paper);
      overflow: hidden;
      cursor: pointer;
      transition: background 0.2s;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s var(--ease-out), transform 0.5s var(--ease-out), background 0.2s;
    }

    .cert-card.visible { opacity: 1; transform: none; }
    .cert-card:hover { background: var(--warm); }

    .cert-thumb {
      aspect-ratio: 4/3;
      background: var(--warm);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .cert-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 0.75rem;
      transition: transform 0.4s var(--ease-out);
    }

    .cert-card:hover .cert-thumb img { transform: scale(1.04); }

    .cert-thumb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(14,14,14,0);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .cert-card:hover .cert-thumb-overlay { background: rgba(14,14,14,0.35); }

    .cert-thumb-icon {
      width: 2.5rem;
      height: 2.5rem;
      background: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: var(--ink);
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.25s, transform 0.25s var(--ease-out);
    }

    .cert-card:hover .cert-thumb-icon { opacity: 1; transform: scale(1); }

    .cert-body {
      padding: 1rem 1.2rem 1.2rem;
      border-top: 1px solid var(--border);
    }

    .cert-index {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    .cert-name {
      font-family: var(--serif);
      font-size: 1rem;
      line-height: 1.25;
      color: var(--ink);
    }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(14,14,14,0.92);
      z-index: 950;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-box {
      background: var(--ink);
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      position: relative;
      transform: scale(0.96);
      transition: transform 0.3s var(--ease-out);
    }

    .modal-backdrop.open .modal-box { transform: scale(1); }

    .modal-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(245,240,232,0.1);
      flex-shrink: 0;
    }

    .modal-cert-name {
      font-family: var(--serif);
      font-size: 1.1rem;
      color: var(--paper);
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70%;
    }

    .modal-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

    .modal-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid rgba(245,240,232,0.2);
      color: rgba(245,240,232,0.6);
      background: none;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .modal-btn:hover { border-color: var(--paper); color: var(--paper); }

    .modal-btn.close-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

    .modal-image-area {
      flex: 1;
      overflow: hidden;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 0;
      cursor: grab;
    }

    .modal-image-area:active { cursor: grabbing; }

    .modal-image-area img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
      transition: filter 0.2s;
    }

    .modal-hint {
      padding: 0.6rem 1.5rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.2);
      border-top: 1px solid rgba(245,240,232,0.06);
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--ink);
      color: var(--paper);
      padding: 2.5rem 2rem;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .footer-brand { font-family: var(--serif); font-size: 1.1rem; }
    .footer-brand span { font-style: italic; color: var(--accent); }

    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { color: rgba(245,240,232,0.4); font-size: 1rem; transition: color 0.2s; text-decoration: none; }
    .footer-links a:hover { color: var(--paper); }

    .footer-copy {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: rgba(245,240,232,0.25);
      letter-spacing: 0.05em;
    }

    /* ── BACK TO TOP ── */
    #btt {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 800;
      width: 2.8rem;
      height: 2.8rem;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      opacity: 0;
      transform: translateY(1rem);
      transition: opacity 0.3s, transform 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #btt.visible { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .certs-grid { grid-template-columns: repeat(2, 1fr); }
      .modal-backdrop { padding: 1rem; }
    }

    @media (max-width: 560px) {
      .certs-grid { grid-template-columns: 1fr; }
      .page-meta { gap: 1rem; }
      .modal-cert-name { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <!-- ── NAV ── -->
  <header id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">D.<span>T</span></a>
      <a href="index.html" class="nav-back">
        <i class="fas fa-arrow-left"></i> Back
      </a>
    </div>
  </header>

  <!-- ── PAGE HEADER ── -->
  <div class="page-header">
    <div class="page-header-bg">★</div>
    <div class="container">
      <p class="page-eyebrow">Recognition</p>
      <h1 class="page-title">My<br><em>Certificates</em></h1>
      <div class="page-meta">
        <div class="page-meta-item">
          <strong id="cert-count">29</strong>
          certificates earned
        </div>
        <div class="page-meta-item">
          <i class="fas fa-mouse-pointer" style="font-size:.7rem"></i>
          click any to enlarge
        </div>
      </div>
    </div>
  </div>

  <!-- ── CERTS ── -->
  <section id="certs-section">
    <div class="container">
      <div class="certs-grid" id="certsGrid"></div>
    </div>
  </section>

  <!-- ── FOOTER ── -->
  <footer>
    <div class="footer-inner">
      <div class="footer-brand">Muhammad <span>Delfa</span> Tamerawan</div>
      <div class="footer-links">
        <a href="https://www.linkedin.com/in/delfa-tamerawan/" target="_blank"><i class="fab fa-linkedin"></i></a>
        <a href="https://github.com/delfa-23" target="_blank"><i class="fab fa-github"></i></a>
        <a href="https://www.instagram.com/delfa_tamerawan/" target="_blank"><i class="fab fa-instagram"></i></a>
      </div>
      <p class="footer-copy">© 2025 Delfa Tamerawan</p>
    </div>
  </footer>

  <button id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">
    <i class="fas fa-chevron-up"></i>
  </button>

  <!-- ── MODAL ── -->
  <div class="modal-backdrop" id="modal" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-topbar">
        <span class="modal-cert-name" id="modalName"></span>
        <div class="modal-actions">
          <a id="modalDownload" class="modal-btn" download>
            <i class="fas fa-download"></i> Download
          </a>
          <button class="modal-btn close-btn" onclick="closeModal()">
            <i class="fas fa-times"></i> Close
          </button>
        </div>
      </div>
      <div class="modal-image-area" id="modalImageArea">
        <img id="modalImg" src="" alt="" />
      </div>
      <p class="modal-hint">Scroll to zoom · Drag to pan · Esc to close</p>
    </div>
  </div>

  <script>
    // ── Data ──────────────────────────────────────────────────
    const certifs = [
      { name: 'Internet Introduction',              file: '23. SERTIFIKAT INTERNET INTRODUCTION-1.png' },
      { name: 'Front-End Development Introduction', file: '24. SERTIFIKAT FRONT-END DEVELOPMENT INTRODUCTION-1.png' },
      { name: 'Back-End Development Introduction',  file: '25. SERTIFIKAT BACK END DEVELOPMENT INTRODUCTION-1.png' },
      { name: 'API Introduction',                   file: '26. SERTIFIKAT API INTRODUCTION-1.png' },
      { name: 'How WebDev Works',                   file: '27. SERTIFIKAT HOW WEBDEV WORKS-1.png' },
      { name: 'Figma Community',                    file: 'SERTIFIKAT FIGMA COMMUNITY-1.png' },
      { name: 'Operating FigJam',                   file: 'SERTIFIKAT OPERATING FIGJAM-1.png' },
      { name: 'UI Design Improvement',              file: 'SERTIFIKAT UI DESIGN IMPROVEMENT-1.png' },
      { name: 'Variant and Layout',                 file: 'SERTIFIKAT VARIANT AND LAYOUT-1.png' },
      { name: 'Belajar Wireframing',                file: 'SERTIFIKAT BELAJAR WIREFRAMING-1.png' },
      { name: 'Collaboration',                      file: 'SERTIFIKAT COLLABORATION-1.png' },
      { name: 'Design Documentation',               file: 'SERTIFIKAT DESIGN DOCUMENTATION-1.png' },
      { name: 'Design System',                      file: 'SERTIFIKAT DESIGN SYSTEM-1.png' },
      { name: 'Designing Checkout Process',         file: 'SERTIFIKAT DESIGNING CHECKOUT PROCESS-1.png' },
      { name: 'Designing Dashboard UI',             file: 'SERTIFIKAT DESIGNING DASHBOARD UI-1.png' },
      { name: 'Designing Landing Page',             file: 'SERTIFIKAT DESIGNING LANDING PAGE-1.png' },
      { name: 'Designing Onboarding',               file: 'SERTIFIKAT DESIGNING ONBOARDING-1.png' },
      { name: 'FigJam Brainstorming & Ideation',    file: 'SERTIFIKAT FIGJAM BRAINSTORMING & IDEATION-1.png' },
      { name: 'FigJam',                             file: 'SERTIFIKAT FIGJAM-1.png' },
      { name: 'Figma Tools',                        file: 'SERTIFIKAT FIGMA TOOLS-1.png' },
      { name: 'Hi-Fi',                              file: 'SERTIFIKAT HI-FI-1.png' },
      { name: 'Introduction Figma',                 file: 'SERTIFIKAT INTRODUCTION FIGMA-1.png' },
      { name: 'Plugin',                             file: 'SERTIFIKAT PLUGIN-1.png' },
      { name: 'Profil Page',                        file: 'SERTIFIKAT PROFIL PAGE-1.png' },
      { name: 'Prototyping FigJam Mirror',          file: 'SERTIFIKAT PROTOTYPING FIGMA MIRROR-1.png' },
      { name: 'Prototyping',                        file: 'SERTIFIKAT PROTOTYPING-1.png' },
      { name: 'Style Guide',                        file: 'SERTIFIKAT STYLE GUIDE-1.png' },
      { name: 'Intro to Data Analytics',            file: 'data_analyst.png' },
      { name: 'Flutter',                            file: 'flutter_sanbercode-1.png' },
    ];

    // ── Build grid ────────────────────────────────────────────
    const grid = document.getElementById("certsGrid");
    document.getElementById("cert-count").textContent = certifs.length;

    certifs.forEach((cert, i) => {
      const card = document.createElement("div");
      card.className = "cert-card";
      card.style.transitionDelay = `${(i % 6) * 60}ms`;
      card.innerHTML = `
        <div class="cert-thumb">
          <img src="assets/certificates/${cert.file}" alt="${cert.name}" loading="lazy" />
          <div class="cert-thumb-overlay">
            <div class="cert-thumb-icon"><i class="fas fa-expand"></i></div>
          </div>
        </div>
        <div class="cert-body">
          <p class="cert-index">Cert. ${String(i + 1).padStart(2, "0")}</p>
          <p class="cert-name">${cert.name}</p>
        </div>
      `;
      card.addEventListener("click", () => openModal(cert.file, cert.name));
      grid.appendChild(card);
    });

    // ── Reveal on scroll ──────────────────────────────────────
    const cards = document.querySelectorAll(".cert-card");
    const revealObs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("visible"); });
    }, { threshold: 0.08 });
    cards.forEach(c => revealObs.observe(c));

    // ── Navbar scroll ─────────────────────────────────────────
    let lastY = 0;
    const navbar = document.getElementById("navbar");
    const btt = document.getElementById("btt");
    window.addEventListener("scroll", () => {
      const y = window.pageYOffset;
      navbar.style.transform = (y > 100 && y > lastY) ? "translateY(-100%)" : "translateY(0)";
      if (y > 100) navbar.classList.add("scrolled"); else navbar.classList.remove("scrolled");
      btt.classList.toggle("visible", y > 400);
      lastY = y;
    });

    // ── Modal ─────────────────────────────────────────────────
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");
    const modalName = document.getElementById("modalName");
    const modalDownload = document.getElementById("modalDownload");
    const imageArea = document.getElementById("modalImageArea");

    let scale = 1, tx = 0, ty = 0, dragging = false, startX, startY;
    let lastPinchDist = 0;

    function applyTransform() {
      modalImg.style.transform = `scale(${scale}) translate(${tx}px, ${ty}px)`;
    }

    function resetTransform() {
      scale = 1; tx = 0; ty = 0;
      modalImg.style.transform = "";
      modalImg.style.transformOrigin = "center center";
    }

    function openModal(file, name) {
      const path = "assets/certificates/" + file;
      modalImg.src = path;
      modalName.textContent = name;
      modalDownload.href = path;
      modalDownload.download = name + ".png";
      resetTransform();
      modal.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      modal.classList.remove("open");
      document.body.style.overflow = "";
      setTimeout(() => { modalImg.src = ""; }, 300);
    }

    // Scroll to zoom
    imageArea.addEventListener("wheel", (e) => {
      e.preventDefault();
      scale += e.deltaY < 0 ? 0.12 : -0.12;
      scale = Math.min(Math.max(0.5, scale), 6);
      applyTransform();
    }, { passive: false });

    // Drag to pan
    imageArea.addEventListener("mousedown", (e) => {
      if (scale <= 1) return;
      dragging = true;
      startX = e.clientX - tx * scale;
      startY = e.clientY - ty * scale;
      imageArea.style.cursor = "grabbing";
    });
    window.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      tx = (e.clientX - startX) / scale;
      ty = (e.clientY - startY) / scale;
      applyTransform();
    });
    window.addEventListener("mouseup", () => {
      dragging = false;
      imageArea.style.cursor = "";
    });

    // Touch pinch + pan
    imageArea.addEventListener("touchstart", (e) => {
      if (e.touches.length === 2) {
        lastPinchDist = Math.hypot(
          e.touches[1].clientX - e.touches[0].clientX,
          e.touches[1].clientY - e.touches[0].clientY
        );
      } else if (e.touches.length === 1 && scale > 1) {
        dragging = true;
        startX = e.touches[0].clientX - tx * scale;
        startY = e.touches[0].clientY - ty * scale;
      }
    }, { passive: true });

    imageArea.addEventListener("touchmove", (e) => {
      e.preventDefault();
      if (e.touches.length === 2) {
        const dist = Math.hypot(
          e.touches[1].clientX - e.touches[0].clientX,
          e.touches[1].clientY - e.touches[0].clientY
        );
        if (lastPinchDist) {
          scale += (dist - lastPinchDist) * 0.01;
          scale = Math.min(Math.max(0.5, scale), 6);
          applyTransform();
        }
        lastPinchDist = dist;
      } else if (e.touches.length === 1 && dragging) {
        tx = (e.touches[0].clientX - startX) / scale;
        ty = (e.touches[0].clientY - startY) / scale;
        applyTransform();
      }
    }, { passive: false });

    imageArea.addEventListener("touchend", () => {
      dragging = false;
      lastPinchDist = 0;
    });

    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });
  </script>
</body>
</html>
